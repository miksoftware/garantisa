server {
    listen 80;
    server_name _;  # Cambiar por tu dominio o IP

    root /var/www/comentarios/public;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;

    access_log /var/log/nginx/comentarios_access.log;
    error_log  /var/log/nginx/comentarios_error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Timeouts largos para SSE
        fastcgi_read_timeout 600;
        fastcgi_send_timeout 600;
        fastcgi_buffering off;
        fastcgi_request_buffering off;
    }

    # SSE - desactivar buffering para streaming en tiempo real
    location ~ ^/process/ {
        try_files $uri /index.php?$query_string;
        proxy_buffering off;
        proxy_cache off;
    }

    # Bloquear archivos ocultos
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
